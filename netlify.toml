[build]
  command = "cd frontend && npm run build"
  publish = "frontend/.next"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "https://rh-backend.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from = "/ws/*"
  to = "wss://rh-backend.onrender.com/ws/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
